<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예서의 첫 생일</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&family=Jua&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; }
  body {
    font-family:'Gowun Dodum', sans-serif;
    background:
      radial-gradient(circle at 15% 8%, #ffe3ee 0%, transparent 38%),
      radial-gradient(circle at 88% 14%, #e0eeff 0%, transparent 36%),
      radial-gradient(circle at 82% 92%, #fff0d6 0%, transparent 40%),
      radial-gradient(circle at 10% 90%, #ecdcff 0%, transparent 38%),
      linear-gradient(165deg, #fff8f5 0%, #f5eefb 100%);
    background-attachment:fixed;
    min-height:100vh; overflow-x:hidden; position:relative;
    display:flex; flex-direction:column; align-items:center;
    padding:0 18px 70px;
  }

  /* ===== 떠다니는 하트 풍선 ===== */
  .balloons { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .balloon { position:absolute; bottom:-140px; animation: floatUp linear infinite; will-change:transform; }
  .balloon svg { display:block; filter:drop-shadow(0 6px 10px rgba(150,110,150,.18)); }
  .balloon .string { stroke:rgba(160,140,170,.4); stroke-width:1.5; fill:none; }
  @keyframes floatUp {
    0%{ transform:translateY(0) translateX(0) rotate(-4deg); opacity:0; }
    8%{ opacity:.9; }
    50%{ transform:translateY(-55vh) translateX(18px) rotate(4deg); }
    92%{ opacity:.9; }
    100%{ transform:translateY(-118vh) translateX(-10px) rotate(-3deg); opacity:0; }
  }
  .sparkle { position:fixed; pointer-events:none; z-index:0; animation: twinkle 2.4s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.2;transform:scale(.7);} 50%{opacity:1;transform:scale(1.15);} }

  /* ===== 뛰어다니는 강아지 ===== */
  .dog-zone { position:fixed; left:0; right:0; bottom:0; height:230px; pointer-events:none; z-index:9; overflow:visible; }
  .dog {
    position:absolute; bottom:8px; width:118px;
    animation: runAcross 13s linear infinite;
    will-change:transform;
  }
  .dog .hop {
    display:block; width:100%;
    animation: hop 0.62s ease-in-out infinite;
    filter:drop-shadow(0 10px 8px rgba(120,90,110,.22));
    transform-origin:bottom center;
  }
  .dog img { width:100%; display:block; }
  /* 좌->우로 갔다가 뒤집혀서 우->좌 : 두 마리처럼 보이게 한 마리로 왕복 */
  @keyframes runAcross {
    0%   { transform:translateX(-140px) scaleX(1); }
    48%  { transform:translateX(calc(100vw + 20px)) scaleX(1); }
    49%  { transform:translateX(calc(100vw + 20px)) scaleX(-1); }
    97%  { transform:translateX(-140px) scaleX(-1); }
    98%  { transform:translateX(-140px) scaleX(1); }
    100% { transform:translateX(-140px) scaleX(1); }
  }
  @keyframes hop {
    0%,100% { transform:translateY(0) rotate(-2deg) scaleY(1); }
    30%     { transform:translateY(-34px) rotate(0deg) scaleY(1.04); }
    60%     { transform:translateY(0) rotate(2deg) scaleY(.96); }
  }
  /* 작은 발자국/먼지 하트 */
  .pawheart { position:fixed; bottom:14px; z-index:8; font-size:16px; opacity:0;
    animation: pawpop 13s linear infinite; pointer-events:none; }

  /* ===== 카드 ===== */
  .wrap { position:relative; z-index:2; width:100%; max-width:430px; }
  .header { text-align:center; padding:46px 0 8px; }
  .header .en { font-family:'Quicksand',sans-serif; font-weight:700; font-size:15px;
    letter-spacing:6px; color:#f29bb8; animation:fadeDown .8s ease both; }
  .header .title { font-family:'Jua',sans-serif; font-size:40px; color:#5e5675;
    margin-top:8px; line-height:1.25; animation:fadeDown .8s ease .12s both; }
  .header .title .pink { color:#f48fb1; }
  .header .heart-row { margin-top:10px; font-size:22px; letter-spacing:6px; animation:fadeDown .8s ease .24s both; }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-16px);} to{opacity:1;transform:none;} }
  @keyframes pop { from{opacity:0;transform:scale(.85) rotate(-3deg);} to{opacity:1;transform:none;} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:none;} }

  .photo-card { position:relative; width:86%; margin:26px auto 0;
    border:11px solid #fff; border-radius:40px; overflow:hidden;
    box-shadow:0 22px 44px rgba(150,120,170,.26);
    transform:rotate(-2deg); animation:pop .9s cubic-bezier(.2,.9,.3,1.2) .3s both; }
  .photo-card img { width:100%; display:block; }
  .badge { position:absolute; top:-14px; right:-6px; background:#fff;
    font-family:'Gaegu',cursive; font-weight:700; font-size:23px; color:#e76a93;
    padding:8px 20px; border-radius:30px; transform:rotate(9deg);
    box-shadow:0 8px 16px rgba(150,120,170,.22); z-index:3;
    animation:pop .9s cubic-bezier(.2,.9,.3,1.2) .8s both; }
  .float-emoji { position:absolute; font-size:30px; z-index:3; animation:bob 3s ease-in-out infinite; }
  .fe1 { top:18px; left:-14px; animation-delay:.2s; }
  .fe2 { bottom:30px; right:-16px; animation-delay:1s; }
  @keyframes bob { 0%,100%{transform:translateY(0) rotate(-6deg);} 50%{transform:translateY(-10px) rotate(6deg);} }

  .name-area { text-align:center; margin-top:34px; animation:fadeUp .8s ease .5s both; }
  .name-area .small { font-family:'Quicksand',sans-serif; font-weight:600; font-size:16px; letter-spacing:3px; color:#a497c0; }
  .name { font-family:'Jua',sans-serif; font-size:64px; color:#5e5675; margin-top:2px; }
  .name .h { color:#f48fb1; }

  .greet { text-align:center; margin:22px auto 0; max-width:340px; font-size:17px; line-height:2; color:#6f6786; animation:fadeUp .8s ease .6s both; }

  .info { margin:34px auto 0; max-width:360px; display:flex; flex-direction:column; gap:14px; }
  .info-card { background:rgba(255,255,255,.8); backdrop-filter:blur(4px);
    border-radius:24px; padding:20px 22px; display:flex; align-items:center; gap:16px;
    box-shadow:0 10px 24px rgba(150,120,170,.14); animation:fadeUp .8s ease both; }
  .info-card:nth-child(1){animation-delay:.7s;} .info-card:nth-child(2){animation-delay:.8s;}
  .info-card .ic { width:52px; height:52px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:26px; }
  .ic-pink{ background:#ffe1ec; } .ic-blue{ background:#e1edff; }
  .info-card .tx .l { font-family:'Quicksand',sans-serif; font-weight:700; font-size:13px; letter-spacing:2px; color:#e89cb4; }
  .info-card .tx .v { font-family:'Jua',sans-serif; font-size:24px; color:#5e5675; margin-top:3px; }
  .info-card .tx .s { font-size:14px; color:#8c83a3; margin-top:3px; }

  .map-btn { display:block; margin:18px auto 0; max-width:360px; text-decoration:none;
    background:linear-gradient(135deg,#ffafcc,#ffc8a2); color:#fff;
    font-family:'Jua',sans-serif; font-size:19px; text-align:center;
    padding:16px; border-radius:24px; box-shadow:0 12px 26px rgba(255,150,170,.4);
    animation:fadeUp .8s ease .9s both; transition:transform .15s; }
  .map-btn:active { transform:scale(.96); }

  .pet-note { text-align:center; margin-top:30px; font-family:'Gaegu',cursive; font-size:19px; color:#c79ab0; animation:fadeUp .8s ease .95s both; }

  .footer { text-align:center; margin-top:18px; font-family:'Gaegu',cursive; font-size:22px; color:#b3a8c8; animation:fadeUp .8s ease 1s both; padding-bottom:160px; }
  .footer .big-heart { font-size:30px; display:block; margin-bottom:6px; animation:beat 1.3s ease-in-out infinite; }
  @keyframes beat { 0%,100%{transform:scale(1);} 30%{transform:scale(1.25);} 45%{transform:scale(1.05);} }

  /* ===== 사진 갤러리 ===== */
  .gallery { margin:42px auto 0; max-width:380px; animation:fadeUp .8s ease 1s both; }
  .gallery .g-head { text-align:center; margin-bottom:18px; }
  .gallery .g-head .en { font-family:'Quicksand',sans-serif; font-weight:700; font-size:13px; letter-spacing:3px; color:#e89cb4; }
  .gallery .g-head .ko { font-family:'Jua',sans-serif; font-size:27px; color:#5e5675; margin-top:5px; }
  .g-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .g-item { position:relative; border:6px solid #fff; border-radius:22px; overflow:hidden;
    box-shadow:0 12px 26px rgba(150,120,170,.18); aspect-ratio:1/1; cursor:pointer;
    background:#f6eef8; transition:transform .18s; }
  .g-item:active { transform:scale(.96); }
  .g-item img { width:100%; height:100%; object-fit:cover; display:block; }

  /* ===== 라이트박스 ===== */
  .lightbox { position:fixed; inset:0; z-index:50; display:none;
    align-items:center; justify-content:center; padding:24px;
    background:rgba(94,86,117,.78); backdrop-filter:blur(6px); }
  .lightbox.open { display:flex; animation:lbFade .25s ease; }
  @keyframes lbFade { from{opacity:0;} to{opacity:1;} }
  .lb-img { max-width:92vw; max-height:80vh; border:8px solid #fff; border-radius:26px;
    box-shadow:0 24px 50px rgba(60,40,80,.45); animation:pop .35s cubic-bezier(.2,.9,.3,1.2) both; }
  .lb-btn { position:absolute; top:50%; transform:translateY(-50%);
    width:48px; height:48px; border:none; border-radius:50%; cursor:pointer;
    background:rgba(255,255,255,.92); color:#e76a93; font-size:26px; line-height:1;
    box-shadow:0 6px 16px rgba(60,40,80,.3); display:flex; align-items:center; justify-content:center; }
  .lb-btn:active { transform:translateY(-50%) scale(.92); }
  .lb-prev { left:14px; } .lb-next { right:14px; }
  .lb-close { position:absolute; top:18px; right:18px; width:44px; height:44px;
    border:none; border-radius:50%; cursor:pointer; background:rgba(255,255,255,.92);
    color:#e76a93; font-size:20px; box-shadow:0 6px 16px rgba(60,40,80,.3); }
</style>
</head>
<body>
  <div class="balloons" id="balloons"></div>

  <div class="wrap">
    <div class="header">
      <div class="en">FIRST BIRTHDAY</div>
      <div class="title">예서의 <span class="pink">첫 생일</span><br>초대합니다</div>
      <div class="heart-row">💗 💙 💛 💜 🩷</div>
    </div>

    <div class="photo-card">
      <span class="badge">1살 🎂</span>
      <span class="float-emoji fe1">🌸</span>
      <span class="float-emoji fe2">⭐</span>
      <img src="photos/main.JPG" alt="예서 가족 사진">
    </div>

    <div class="name-area">
      <div class="small">우리 공주님</div>
      <div class="name">염예<span class="h">서</span></div>
    </div>

    <div class="greet">
      무럭무럭 자란 예서가<br>
      어느덧 첫 번째 생일을 맞이했어요.<br>
      귀한 걸음으로 축하해 주시면<br>
      큰 기쁨이 되겠습니다 :)
    </div>

    <div class="info">
      <div class="info-card">
        <div class="ic ic-pink">📅</div>
        <div class="tx">
          <div class="l">WHEN</div>
          <div class="v">2026. 06. 27 (토)</div>
          <div class="s">오전 11:30</div>
        </div>
      </div>
      <div class="info-card">
        <div class="ic ic-blue">📍</div>
        <div class="tx">
          <div class="l">WHERE</div>
          <div class="v">서울경복궁 갈비구이&불고기</div>
          <div class="s">경기 광명시 양달로 8, 4층</div>
        </div>
      </div>
    </div>

    <a class="map-btn" href="https://map.naver.com/v5/search/경기 광명시 양달로 8" target="_blank">📌 지도에서 위치 보기</a>

    <div class="gallery">
      <div class="g-head">
        <div class="en">OUR LITTLE MOMENTS</div>
        <div class="ko">예서의 첫 1년 📸</div>
      </div>
      <div class="g-grid" id="gallery">
        <div class="g-item"><img src="photos/main.JPG" alt="예서 1"></div>
        <div class="g-item"><img src="photos/2124.JPG" alt="예서 2"></div>
        <div class="g-item"><img src="photos/2149.JPG" alt="예서 3"></div>
        <div class="g-item"><img src="photos/2174.JPG" alt="예서 4"></div>
      </div>
    </div>

    <div class="pet-note">🐾 우리집 막내도 함께 기다릴게요 🐾</div>

    <div class="footer">
      <span class="big-heart">💗</span>
      예서의 첫 봄에 함께해 주세요
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose" aria-label="닫기">✕</button>
    <button class="lb-btn lb-prev" id="lbPrev" aria-label="이전">‹</button>
    <img class="lb-img" id="lbImg" src="" alt="">
    <button class="lb-btn lb-next" id="lbNext" aria-label="다음">›</button>
  </div>

<script>
  const colors = ['#ff9ec4','#9ec5ff','#ffd98a','#c9a5f6','#ff8fa3','#8ad6c5','#ffb3de'];
  const cont = document.getElementById('balloons');
  function heartSVG(color){
    return `<svg width="46" height="60" viewBox="0 0 46 60">
      <path class="string" d="M23 30 q6 12 -2 28"/>
      <path d="M23 26 C23 18 8 16 8 6 C8 -2 20 -2 23 8 C26 -2 38 -2 38 6 C38 16 23 18 23 26 Z" transform="translate(0,4)" fill="${color}"/>
      <ellipse cx="16" cy="9" rx="3.5" ry="5" fill="rgba(255,255,255,.45)"/>
    </svg>`;
  }
  for(let i=0;i<16;i++){
    const b=document.createElement('div'); b.className='balloon';
    b.innerHTML=heartSVG(colors[i%colors.length]);
    const scale=0.55+Math.random()*0.9, dur=9+Math.random()*8;
    b.style.left=(Math.random()*96)+'vw';
    b.style.transform=`scale(${scale})`;
    b.style.animationDuration=dur+'s';
    b.style.animationDelay=(-Math.random()*dur)+'s';
    b.style.opacity=0; cont.appendChild(b);
  }
  const sp=['✨','⭐','🌟','💫'];
  for(let i=0;i<10;i++){
    const s=document.createElement('div'); s.className='sparkle'; s.textContent=sp[i%sp.length];
    s.style.left=(Math.random()*94)+'vw'; s.style.top=(Math.random()*94)+'vh';
    s.style.animationDelay=(Math.random()*2.4)+'s'; s.style.fontSize=(12+Math.random()*14)+'px';
    document.body.appendChild(s);
  }

  // ===== 갤러리 라이트박스 =====
  (function(){
    const imgs = Array.from(document.querySelectorAll('#gallery img'));
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    let idx = 0;
    function show(i){
      idx = (i + imgs.length) % imgs.length;
      lbImg.src = imgs[idx].src;
      lbImg.alt = imgs[idx].alt;
    }
    function open(i){ show(i); lb.classList.add('open'); }
    function close(){ lb.classList.remove('open'); }
    imgs.forEach((im,i)=> im.addEventListener('click', ()=>open(i)));
    document.getElementById('lbPrev').addEventListener('click', e=>{ e.stopPropagation(); show(idx-1); });
    document.getElementById('lbNext').addEventListener('click', e=>{ e.stopPropagation(); show(idx+1); });
    document.getElementById('lbClose').addEventListener('click', close);
    lb.addEventListener('click', e=>{ if(e.target===lb) close(); });
    document.addEventListener('keydown', e=>{
      if(!lb.classList.contains('open')) return;
      if(e.key==='Escape') close();
      else if(e.key==='ArrowLeft') show(idx-1);
      else if(e.key==='ArrowRight') show(idx+1);
    });
  })();
</script>
